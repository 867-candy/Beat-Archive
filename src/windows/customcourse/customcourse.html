<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カスタムコース - Beat Archive</title>
  <link rel="stylesheet" href="../../common/styles/common.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="../main/index.html">更新曲一覧</a>
      <a href="../clearlamp/clearlamp.html">クリアランプ</a>
      <a href="../customcourse/customcourse.html" class="active">カスタムコース</a>
      <a href="../settings/settings.html">設定</a>
    </nav>

    <h1>カスタムコース作成</h1>

    <h2 class="course-builder-heading">Warm Up Mixコース作成</h2>
    <p>※Warm Up Mixコース作成から作成されたコースはIRに登録されません。</p>
    <div class="setting-group course-builder-card">
      <section class="builder-section">
        <h3>基本設定</h3>
        <div class="form-grid">
          <div class="form-item">
            <label for="courseNameInput">コース名</label>
            <input type="text" id="courseNameInput" placeholder="例: Warm Up MIX (★1~4)">
          </div>

          <div class="form-item">
            <label for="tableSelect">使用する難易度表</label>
            <select id="tableSelect">
              <option value="">難易度表を選択してください</option>
            </select>
          </div>
        </div>
        <p class="hint">難易度表を選択すると、各ステージの難易度候補が自動で読み込まれます。</p>
      </section>

      <section class="builder-section">
        <h3>ステージ難易度</h3>
        <div class="form-grid stage-grid">
          <div class="form-item">
            <label for="stage1Level">1st stage の難易度</label>
            <select id="stage1Level"></select>
          </div>
          <div class="form-item">
            <label for="stage2Level">2nd stage の難易度</label>
            <select id="stage2Level"></select>
          </div>
          <div class="form-item">
            <label for="stage3Level">3rd stage の難易度</label>
            <select id="stage3Level"></select>
          </div>
          <div class="form-item">
            <label for="stageFinalLevel">final stage の難易度</label>
            <select id="stageFinalLevel"></select>
          </div>
        </div>
      </section>

      <section class="builder-section builder-section--last">
        <h3>制約設定</h3>
        <div class="form-grid">
          <div class="form-item">
            <label for="optionSetting">プレイオプション許可設定</label>
            <select id="optionSetting">
              <option value="CLASS">正規のみ</option>
              <option value="MIRROR">MIRRORを許可</option>
              <option value="RANDOM" selected>RANDOMを許可</option>
            </select>
          </div>

          <div class="form-item">
            <label for="gaugeSetting">ゲージ設定</label>
            <select id="gaugeSetting">
              <option value="GAUGE_LR2">LR2段位ゲージ</option>
              <option value="GAUGE_7keys">7keys段位ゲージ</option>
              <option value="GAUGE_5keys">5keys段位ゲージ</option>
              <option value="GAUGE_9keys">9keys段位ゲージ</option>
              <option value="GAUGE_24keys">24keys段位ゲージ</option>
            </select>
          </div>

          <div class="form-item">
            <label for="lnTypeSetting">LNタイプ設定</label>
            <select id="lnTypeSetting">
              <option value="LN">LN</option>
              <option value="CN">CN</option>
              <option value="HCN">HCN</option>
            </select>
          </div>

          <div class="form-item">
            <label for="noSpeedSetting">NO_SPEED設定</label>
            <select id="noSpeedSetting">
              <option value="">(なし)</option>
              <option value="NO_SPEED">NO_SPEED</option>
            </select>
          </div>

          <div class="form-item">
            <label for="noGoodSetting">NO_GOOD設定</label>
            <select id="noGoodSetting">
              <option value="">(なし)</option>
              <option value="NO_GOOD">NO_GOOD</option>
              <option value="NO_GREAT">NO_GREAT</option>
            </select>
          </div>
        </div>
      </section>
    </div>

    <div class="editing-notice" id="editingNotice" hidden></div>

    <div class="actions">
      <button class="btn" id="generateBtn">ランダム選曲してプレビュー</button>
      <button class="btn primary" id="saveBtn">JSONに保存</button>
      <button class="btn secondary" id="cancelEditBtn" type="button" hidden>編集解除</button>
    </div>

    <div class="status" id="status"></div>

    <div class="preview" id="previewSection">
      <h3>生成プレビュー</h3>
      <ul id="previewList">
        <li class="no-results">まだコースが生成されていません</li>
      </ul>
    </div>

    <div class="preview" id="existingCoursesSection">
      <div class="existing-header">
        <h3>コース一覧</h3>
        <div class="existing-summary" id="existingCourseSummary">設定画面の Player* フォルダ設定から default.json を自動で読み込みます</div>
      </div>
      <div class="existing-bulk-actions">
        <button class="btn secondary" id="bulkShuffleWarmUpMixBtn" type="button">Warm Up Mix一括再選曲</button>
      </div>
      <ul id="existingCourseList">
        <li class="no-results">Player* フォルダが未設定です</li>
      </ul>
    </div>
  </div>

  <script src="customcourse-window.js"></script>
</body>
</html>
